<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IT Hub VN | Bai viet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-layer bg-a"></div>
    <div class="bg-layer bg-b"></div>

    <header class="site-header">
      <div class="container nav-wrap">
        <a href="/" class="logo">IT Hub VN</a>
        <div class="header-actions">
          <button id="langToggle" class="ghost-btn" type="button">EN</button>
          <button id="themeToggle" class="ghost-btn" type="button">Dark</button>
        </div>
      </div>
    </header>

    <main class="container article-shell">
      <a class="back-link" href="/" data-i18n="article.back">Quay lai trang chu</a>
      <article id="articleBox" class="article-box">
        <p data-i18n="article.loading">Dang tai noi dung...</p>
      </article>
    </main>

    <script src="settings.js"></script>
    <script src="article.js"></script>
  </body>
</html>
